<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <section class="section" id="contact">
      <div class="container">
        <header class="section-head">
          <h2>Chatbot</h2>
        </header>

        <div style="margin-bottom: 24px;">
          <h2>Upload Document</h2>
          <input type="file" id="document-upload" accept=".pdf,.txt">
          <button id="upload-btn" class="btn primary" type="button">Upload</button>

          <h3>Uploaded Documents</h3>
          <ul id="documents-list"></ul>
        </div>

        <div class="contact-grid">
          <form id="contact-form" class="contact-form">
            <div class="field">
              <label for="message">Your Prompt</label>
              <textarea id="message" name="message" rows="6" placeholder="Ask me anything..." required></textarea>
            </div>

            <button id="submit-btn" class="btn primary" type="submit">Submit</button>
          </form>
          <div id="response"></div>
        </div>
      </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
